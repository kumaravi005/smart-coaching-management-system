{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Dashboard</h2>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="card stats-card bg-primary text-white">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-chalkboard-teacher"></i> Teachers</h5>
                <h2 class="display-4">{{ stats.teachers_count }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card stats-card bg-success text-white">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-door-open"></i> Rooms</h5>
                <h2 class="display-4">{{ stats.rooms_count }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card stats-card bg-info text-white">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-book"></i> Classes</h5>
                <h2 class="display-4">{{ stats.classes_count }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body text-center p-5">
        <h4>Ready to generate the schedule?</h4>
        <p class="text-muted">The system will automatically allocate resources based on priorities and availability.</p>
        <form action="{{ url_for('schedule.generate_schedule') }}" method="POST">
            <button type="submit" class="btn btn-lg btn-primary shadow-sm mt-3">
                <i class="fas fa-magic me-2"></i> Generate Smart Schedule
            </button>
        </form>
    </div>
</div>
{% endblock %}
